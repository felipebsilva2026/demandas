<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demandas de Marketing - Simon Electric</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #f8fafc; font-family: sans-serif; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
  </style>
</head>
<body class="p-6">
  <div id="app" class="max-w-7xl mx-auto">
    <header class="flex items-center gap-4 border-b pb-6 mb-6">
      <div class="w-16 h-16 bg-white border rounded-lg overflow-hidden flex items-center justify-center">
        <img src="https://drive.google.com/uc?id=1eMkveuSPyccEaoFOh8lzQVh0HBTB8T1w" alt="Simon Electric" class="w-full h-full object-contain">
      </div>
      <div>
        <h1 class="text-2xl font-bold">Demandas de Marketing</h1>
        <p class="text-slate-500">Sistema Integrado</p>
      </div>
    </header>

    <div id="board" class="flex gap-6 overflow-x-auto min-h-[500px]"></div>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxBUhgOXkGZ6ckb1DXjzyyeJrwCHJSCR17iGyGWCfwK9EEWt4-aVNVbTKeSQkdwRwXDfw/exec';
    
    const COLUMNS = [
      { id: 'backlog', title: 'Backlog', color: 'bg-blue-50 border-blue-200' },
      { id: 'desenvolvimento', title: 'Em desenvolvimento', color: 'bg-sky-50 border-sky-200' },
      { id: 'aprovacao', title: 'Em aprovação', color: 'bg-indigo-50 border-indigo-200' },
      { id: 'pendencias', title: 'Pendências', color: 'bg-cyan-50 border-cyan-200' },
      { id: 'finalizados', title: 'Finalizados', color: 'bg-emerald-50 border-emerald-200' },
      { id: 'cancelados', title: 'Cancelados', color: 'bg-slate-100 border-slate-300' }
    ];

    let tasks = [];

    async function loadTasks() {
      try {
        const res = await fetch(SCRIPT_URL);
        tasks = await res.json();
      } catch(e) { tasks = []; }
      render();
    }

    async function sync() {
      await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(tasks) });
      render();
    }

    function render() {
      const board = document.getElementById('board');
      board.innerHTML = '';
      
      COLUMNS.forEach(col => {
        const colDiv = document.createElement('div');
        colDiv.className = `w-80 flex-shrink-0 flex flex-col rounded-xl border ${col.color}`;
        colDiv.innerHTML = `
          <div class="p-4 font-bold border-b">${col.title}</div>
          <div class="p-3 flex-1 overflow-y-auto space-y-3">
            ${tasks.filter(t => t.status === col.id).map(t => `
              <div class="bg-white p-4 rounded shadow border text-sm">
                <p class="font-bold">${t.title}</p>
                <div class="mt-2 text-xs text-slate-500">${t.type || 'Geral'}</div>
              </div>
            `).join('')}
          </div>
          <div class="p-3">
            <button onclick="addTask('${col.id}')" class="w-full py-2 bg-white/50 hover:bg-white rounded border border-dashed text-xs">+ Adicionar</button>
          </div>
        `;
        board.appendChild(colDiv);
      });
    }

    function addTask(colId) {
      const title = prompt("Título da nova demanda:");
      if(title) {
        tasks.push({ id: Date.now(), title, status: colId, type: 'Painéis' });
        sync();
      }
    }

    loadTasks();
  </script>
</body>
</html>
