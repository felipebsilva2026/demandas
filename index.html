<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demandas de Marketing - Simon Electric</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { background-color: #f8fafc; font-family: ui-sans-serif, system-ui, sans-serif; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module" data-presets="react,env">
    const { useState, useRef, useEffect } = React;

    // === CONFIGURAÇÕES ===
    const GOOGLE_SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxBUhgOXkGZ6ckb1DXjzyyeJrwCHJSCR17iGyGWCfwK9EEWt4-aVNVbTKeSQkdwRwXDfw/exec';
    
    const COLUMNS = [
      { id: 'backlog', title: 'Backlog', color: 'bg-blue-50 border-blue-200' },
      { id: 'desenvolvimento', title: 'Em desenvolvimento', color: 'bg-sky-50 border-sky-200' },
      { id: 'aprovacao', title: 'Em aprovação', color: 'bg-indigo-50 border-indigo-200' },
      { id: 'pendencias', title: 'Pendências', color: 'bg-cyan-50 border-cyan-200' },
      { id: 'finalizados', title: 'Finalizados', color: 'bg-emerald-50 border-emerald-200' },
      { id: 'cancelados', title: 'Cancelados', color: 'bg-slate-100 border-slate-300' },
    ];

    const PRIORITIES = [
      { id: 'baixa', label: 'Baixa', color: 'bg-green-100 text-green-800' },
      { id: 'media', label: 'Média', color: 'bg-yellow-100 text-yellow-800' },
      { id: 'alta', label: 'Alta', color: 'bg-orange-100 text-orange-800' },
      { id: 'urgente', label: 'Urgente', color: 'bg-red-100 text-red-800' },
    ];

    const TASK_TYPES = [
      { id: 'paineis', label: 'Painéis' },
      { id: 'rh', label: 'RH' },
      { id: 'eventos', label: 'Eventos' },
      { id: 'grafico', label: 'Material Gráfico' },
      { id: 'envio', label: 'Envio' },
    ];

    const Icons = {
      Plus: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4"></path></svg>,
      Trash: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>,
      Play: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>,
      Pause: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
    };

    function App() {
      const [tasks, setTasks] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        fetch(GOOGLE_SHEETS_URL)
          .then(res => res.json())
          .then(data => { setTasks(Array.isArray(data) ? data : []); setLoading(false); })
          .catch(() => { setTasks([]); setLoading(false); });
      }, []);

      const sync = (newTasks) => {
        setTasks(newTasks);
        fetch(GOOGLE_SHEETS_URL, { method: 'POST', body: JSON.stringify(newTasks) });
      };

      const toggleTimer = (taskId) => {
        const now = Date.now();
        const updated = tasks.map(t => {
          if (t.id === taskId) return t.isTimerRunning ? { ...t, isTimerRunning: false, timeSpent: t.timeSpent + Math.floor((now - t.lastTimerStart) / 1000), lastTimerStart: null } : { ...t, isTimerRunning: true, lastTimerStart: now };
          return t.isTimerRunning ? { ...t, isTimerRunning: false, timeSpent: t.timeSpent + Math.floor((now - t.lastTimerStart) / 1000), lastTimerStart: null } : t;
        });
        sync(updated);
      };

      return (
        <div className="min-h-screen">
          <header className="bg-white shadow-sm px-6 py-4 flex items-center gap-4 border-b">
            <div className="w-14 h-14 bg-white rounded-lg border overflow-hidden p-1 shadow-sm">
                <img src="https://drive.google.com/uc?id=1eMkveuSPyccEaoFOh8lzQVh0HBTB8T1w" alt="Logo" className="w-full h-full object-contain" />
            </div>
            <div>
              <h1 className="text-2xl font-bold">Demandas de Marketing</h1>
              <p className="text-sm text-slate-500">Simon Electric</p>
            </div>
          </header>

          <main className="p-6 overflow-x-auto flex gap-6">
            {COLUMNS.map(col => (
              <div key={col.id} className={`w-80 rounded-xl border ${col.color} p-4 min-h-[70vh] flex flex-col`}>
                <h2 className="font-bold text-slate-700 mb-4">{col.title}</h2>
                <div className="flex-1 space-y-3">
                  {tasks.filter(t => t.status === col.id).map(task => (
                    <div key={task.id} className="bg-white p-4 rounded-lg shadow-sm border text-sm">
                      <div className="flex justify-between mb-2">
                        <span className={`text-[10px] font-bold px-2 py-1 rounded ${PRIORITIES.find(p=>p.id===task.priority)?.color}`}>{PRIORITIES.find(p=>p.id===task.priority)?.label}</span>
                        <button onClick={() => sync(tasks.filter(t=>t.id!==task.id))}><Icons.Trash /></button>
                      </div>
                      <p className="font-semibold mb-2">{task.title}</p>
                      <button onClick={() => toggleTimer(task.id)} className="flex items-center gap-1 border px-2 py-1 rounded text-xs">{task.isTimerRunning ? <Icons.Pause /> : <Icons.Play />} {formatTime(task.timeSpent)}</button>
                    </div>
                  ))}
                </div>
                <button onClick={() => { const newTask = { id: 't'+Date.now(), title: 'Nova', status: col.id, priority: 'media', type: 'paineis', timeSpent: 0 }; sync([...tasks, newTask]); }} className="w-full mt-4 py-2 text-sm text-slate-500 border border-dashed rounded-lg">Adicionar</button>
              </div>
            ))}
          </main>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
