<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demandas de Marketing - Simon Electric</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script>
    // Estrutura convertida para garantir compatibilidade total sem Babel
    const { useState, useEffect } = React;
    const e = React.createElement;
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxBUhgOXkGZ6ckb1DXjzyyeJrwCHJSCR17iGyGWCfwK9EEWt4-aVNVbTKeSQkdwRwXDfw/exec';

    const COLUMNS = [
      { id: 'backlog', title: 'Backlog', color: 'bg-blue-50 border-blue-200' },
      { id: 'desenvolvimento', title: 'Em desenvolvimento', color: 'bg-sky-50 border-sky-200' },
      { id: 'aprovacao', title: 'Em aprovação', color: 'bg-indigo-50 border-indigo-200' },
      { id: 'pendencias', title: 'Pendências', color: 'bg-cyan-50 border-cyan-200' },
      { id: 'finalizados', title: 'Finalizados', color: 'bg-emerald-50 border-emerald-200' },
      { id: 'cancelados', title: 'Cancelados', color: 'bg-slate-100 border-slate-300' }
    ];

    function App() {
      const [tasks, setTasks] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        fetch(SCRIPT_URL)
          .then(res => res.json())
          .then(data => {
            setTasks(data);
            setLoading(false);
          })
          .catch(() => {
            setLoading(false);
          });
      }, []);

      const addTask = (status) => {
        const title = prompt("Título da nova demanda:");
        if (title) {
          const newTask = { id: Date.now(), title, status, type: 'Painéis', endDate: '' };
          setTasks([...tasks, newTask]);
        }
      };

      if (loading) return e('div', { className: 'p-10 text-center' }, 'A carregar os seus dados...');

      return e('div', { className: 'p-6 bg-slate-50 min-h-screen' },
        e('header', { className: 'flex items-center gap-4 border-b pb-6 mb-6' },
          e('img', { src: 'https://drive.google.com/uc?id=1eMkveuSPyccEaoFOh8lzQVh0HBTB8T1w', className: 'w-16 h-16 object-contain border rounded bg-white p-1' }),
          e('div', null,
            e('h1', { className: 'text-2xl font-bold text-slate-800' }, 'Demandas de Marketing'),
            e('p', { className: 'text-slate-500' }, 'Gestão Integrada Simon Electric')
          )
        ),
        e('div', { className: 'flex gap-6 overflow-x-auto pb-4' },
          COLUMNS.map(col => 
            e('div', { key: col.id, className: `w-80 flex-shrink-0 flex flex-col rounded-xl border ${col.color}` },
              e('div', { className: 'p-4 font-bold text-slate-700 border-b border-inherit' }, col.title),
              e('div', { className: 'p-3 space-y-3 flex-1 overflow-y-auto' },
                tasks.filter(t => t.status === col.id).map(t => 
                  e('div', { key: t.id, className: 'bg-white p-4 rounded shadow border text-sm' },
                    e('p', { className: 'font-bold text-slate-800' }, t.title),
                    e('p', { className: 'text-xs text-slate-500 mt-2 uppercase font-semibold' }, t.type)
                  )
                )
              ),
              e('div', { className: 'p-3' },
                e('button', { onClick: () => addTask(col.id), className: 'w-full py-2 bg-white/50 hover:bg-blue-100 rounded border border-dashed text-xs text-slate-600 font-semibold' }, '+ Adicionar')
              )
            )
          )
        )
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(e(App));
  </script>
</body>
</html>
