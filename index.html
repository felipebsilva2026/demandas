<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minhas Demandas - Kanban</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body { background-color: #f8fafc; font-family: ui-sans-serif, system-ui, sans-serif; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
  </style>
</head>
<body class="min-h-screen flex flex-col bg-slate-50 text-slate-800">

  <!-- Header Principal -->
  <header class="bg-white shadow-sm px-6 py-4 flex flex-col sm:flex-row sm:justify-between sm:items-center border-b border-slate-200 gap-4">
    <div>
      <div class="flex items-center gap-3">
         <h1 class="text-2xl font-bold text-slate-800">Minhas Demandas</h1>
         <span id="cloud-status" class="flex items-center gap-1 text-[10px] bg-slate-100 text-slate-500 border border-slate-200 px-2 py-0.5 rounded-full font-bold uppercase tracking-wider">
            Conectando ao Drive...
         </span>
      </div>
      <p class="text-sm text-slate-500">Integrado ao Google Sheets</p>
    </div>

    <!-- Navegação de Abas -->
    <div class="flex bg-slate-100 p-1 rounded-lg">
      <button id="btn-tab-kanban" onclick="switchTab('kanban')" class="flex items-center gap-2 px-4 py-2 rounded-md text-sm font-medium transition-colors bg-white text-blue-600 shadow-sm">
        <i class="fa-solid fa-table-columns"></i> Quadro
      </button>
      <button id="btn-tab-reports" onclick="switchTab('reports')" class="flex items-center gap-2 px-4 py-2 rounded-md text-sm font-medium transition-colors text-slate-500 hover:text-slate-700">
        <i class="fa-solid fa-chart-simple"></i> Relatórios
      </button>
    </div>

    <button onclick="handleCreateTask(null)" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg shadow-sm flex items-center justify-center gap-2 transition-colors font-medium">
      <i class="fa-solid fa-plus"></i> Nova Demanda
    </button>
  </header>

  <main class="flex-1 overflow-x-auto p-6" id="main-content">
    <!-- O conteúdo do Kanban ou dos Relatórios será injetado aqui -->
  </main>

  <!-- Modais -->
  <div id="modal-container" class="hidden"></div>
  <div id="delete-modal" class="hidden fixed inset-0 z-[100] bg-slate-900/50 backdrop-blur-sm flex justify-center items-center p-4"></div>

  <script>
    // ==========================================
    // 🔗 COLE O SEU LINK DA PLANILHA AQUI ABAIXO
    // ==========================================
    const GOOGLE_SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzD3PTDA9DZHi3o0kGHHgXKhy-YGMwrFHjy9iXkFzENd97wTJFbuQlK1-RoM5WKBOOR0A/exec';

    // Configurações e Arrays Globais
    const COLUMNS = [
      { id: 'backlog', title: 'Backlog', color: 'bg-blue-50 border-blue-200', textCol: 'text-blue-700' },
      { id: 'desenvolvimento', title: 'Em desenvolvimento', color: 'bg-sky-50 border-sky-200' },
      { id: 'aprovacao', title: 'Em aprovação', color: 'bg-indigo-50 border-indigo-200' },
      { id: 'pendencias', title: 'Pendências', color: 'bg-cyan-50 border-cyan-200' },
      { id: 'cancelados', title: 'Cancelados', color: 'bg-slate-100 border-slate-300' },
    ];

    const PRIORITIES = [
      { id: 'baixa', label: 'Baixa', color: 'bg-green-100 text-green-800' },
      { id: 'media', label: 'Média', color: 'bg-yellow-100 text-yellow-800' },
      { id: 'alta', label: 'Alta', color: 'bg-orange-100 text-orange-800' },
      { id: 'urgente', label: 'Urgente', color: 'bg-red-100 text-red-800' },
    ];

    const TASK_TYPES = [
      { id: 'paineis', label: 'Painéis' },
      { id: 'rh', label: 'RH (Comunicação interna)' },
      { id: 'eventos', label: 'Eventos' },
      { id: 'grafico', label: 'Material Gráfico' },
      { id: 'envio', label: 'Envio de Materiais' },
    ];

    let tasks = [];
    let activeTab = 'kanban';
    let draggedTaskId = null;
    let modalStack = [];
    let expandedCards = {};
    let taskToDeleteId = null;

    // Carregamento e Sincronização Inteligente
    async function loadData() {
      // 1. Carrega o que tem no PC para a tela não ficar branca
      const localData = localStorage.getItem('kanban_tasks');
      if (localData) {
        tasks = JSON.parse(localData);
        render();
      }

      // 2. Busca na Planilha as informações mais atualizadas
      if (GOOGLE_SHEETS_URL && GOOGLE_SHEETS_URL.includes('script.google.com')) {
        try {
          const response = await fetch(GOOGLE_SHEETS_URL);
          const cloudData = await response.json();
          
          if (cloudData && cloudData.length > 0) {
            tasks = cloudData;
            localStorage.setItem('kanban_tasks', JSON.stringify(tasks));
            render();
          }

          // Atualiza o crachá de Status na tela
          const badge = document.getElementById('cloud-status');
          badge.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> Sincronizado com Drive';
          badge.className = 'flex items-center gap-1 text-[10px] bg-emerald-50 text-emerald-600 border border-emerald-200 px-2 py-0.5 rounded-full font-bold uppercase tracking-wider';
        } catch (error) {
          console.log("Trabalhando offline no momento.");
        }
      }
    }

    function saveState() {
      // Salva instantaneamente no navegador (Zero travamentos)
      localStorage.setItem('kanban_tasks', JSON.stringify(tasks));
      render();

      // Salva "escondido" na Planilha em segundo plano
      if (GOOGLE_SHEETS_URL && GOOGLE_SHEETS_URL.includes('script.google.com')) {
        fetch(GOOGLE_SHEETS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // Formato seguro para o Google não bloquear
          body: JSON.stringify(tasks)
        }).catch(err => console.log('Sincronização em background falhou, aguardando próxima...'));
      }
    }

    // Formatador de tempo (Segundos para HH:MM:SS)
    function formatTime(totalSeconds) {
      if (!totalSeconds) return '00:00';
      const h = Math.floor(totalSeconds / 3600);
      const m = Math.floor((totalSeconds % 3600) / 60);
      const s = totalSeconds % 60;
      const formattedM = m.toString().padStart(2, '0');
      const formattedS = s.toString().padStart(2, '0');
      return h > 0 ? `${h.toString().padStart(2, '0')}:${formattedM}:${formattedS}` : `${formattedM}:${formattedS}`;
    }

    // Loop global do Cronômetro
    setInterval(() => {
      let updated = false;
      tasks = tasks.map(task => {
        if (task.isTimerRunning) {
          updated = true;
          return { ...task, timeSpent: (task.timeSpent || 0) + 1 };
        }
        return task;
      });
      if (updated) {
        localStorage.setItem('kanban_tasks', JSON.stringify(tasks)); // Apenas salva local para não esgotar a cota do Google
        updateTimerElements();
      }
    }, 1000);

    function updateTimerElements() {
      document.querySelectorAll('[data-timer-id]').forEach(elem => {
        const id = elem.getAttribute('data-timer-id');
        const task = tasks.find(t => t.id === id);
        if (task) {
          let elapsed = 0;
          if (task.isTimerRunning && task.lastTimerStart) {
            elapsed = Math.floor((Date.now() - task.lastTimerStart) / 1000);
          }
          elem.innerText = formatTime(task.timeSpent + elapsed);
        }
      });
    }

    const toggleTimer = (e, taskId) => {
      e.stopPropagation();
      const now = Date.now();
      const target = tasks.find(t => t.id === taskId);
      const isStarting = !target.isTimerRunning;

      tasks = tasks.map(task => {
        if (task.id === taskId) {
          if (isStarting) {
            return { ...task, isTimerRunning: true, lastTimerStart: now };
          } else {
            const elapsed = task.lastTimerStart ? Math.floor((now - task.lastTimerStart) / 1000) : 0;
            return { ...task, isTimerRunning: false, timeSpent: task.timeSpent + elapsed, lastTimerStart: null };
          }
        } else if (isStarting && task.isTimerRunning) {
          const elapsed = task.lastTimerStart ? Math.floor((now - task.lastTimerStart) / 1000) : 0;
          return { ...task, isTimerRunning: false, timeSpent: task.timeSpent + elapsed, lastTimerStart: null };
        }
        return task;
      });
      saveState(); // Ao pausar/iniciar, o backup na Planilha é ativado
    };

    function handleCreateTask(parentId = null) {
      const newTask = {
        id: `t${Date.now()}`,
        parentId: parentId,
        title: parentId ? 'Nova Subtarefa' : 'Nova Demanda',
        status: 'backlog',
        priority: 'media',
        type: 'paineis',
        startDate: '',
        endDate: '',
        description: '',
        comments: [],
        attachments: [],
        timeSpent: 0,
        isTimerRunning: false,
        lastTimerStart: null,
      };
      tasks.push(newTask);
      openTask(newTask.id);
      saveState();
    }

    function openTask(id) {
      modalStack.push(id);
      renderModal();
    }

    function closeTask() {
      modalStack.pop();
      renderModal();
    }

    function closeAllModals() {
      modalStack = [];
      renderModal();
    }

    // Drag and Drop
    function handleDragStart(e, id) { draggedTaskId = id; e.dataTransfer.setData('text/plain', id); }
    function handleDragOver(e) { e.preventDefault(); }
    function handleDrop(e, columnId) {
      e.preventDefault();
      if (!draggedTaskId) return;
      tasks = tasks.map(t => t.id === draggedTaskId ? { ...t, status: columnId } : t);
      draggedTaskId = null;
      saveState();
    }

    function confirmDelete(e, id) {
      e.stopPropagation();
      taskToDeleteId = id;
      const deleteModal = document.getElementById('delete-modal');
      deleteModal.innerHTML = `
        <div class="bg-white rounded-xl shadow-xl max-w-sm w-full p-6">
          <h3 class="text-lg font-bold text-slate-800 mb-2">Excluir Demanda?</h3>
          <p class="text-sm text-slate-600 mb-6">Esta ação removerá a demanda permanentemente da sua planilha.</p>
          <div class="flex justify-end gap-3">
            <button onclick="closeDeleteModal()" class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-lg">Cancelar</button>
            <button onclick="executeDelete()" class="px-4 py-2 text-sm font-medium text-white bg-red-600 hover:bg-red-700 rounded-lg">Excluir</button>
          </div>
        </div>
      `;
      deleteModal.classList.remove('hidden');
    }

    function closeDeleteModal() {
      document.getElementById('delete-modal').classList.add('hidden');
      taskToDeleteId = null;
    }

    function getSubtaskIdsToRemove(parentId) {
      let ids = [];
      const children = tasks.filter(t => t.parentId === parentId);
      for (const child of children) {
        ids.push(child.id);
        ids = [...ids, ...getSubtaskIdsToRemove(child.id)];
      }
      return ids;
    }

    function executeDelete() {
      if (!taskToDeleteId) return;
      const idsToRemove = [taskToDeleteId, ...getSubtaskIdsToRemove(taskToDeleteId)];
      tasks = tasks.filter(t => !idsToRemove.includes(t.id));
      modalStack = modalStack.filter(id => !idsToRemove.includes(id));
      closeDeleteModal();
      saveState();
      renderModal();
    }

    function toggleExpandCard(e, id) {
      e.stopPropagation();
      expandedCards[id] = !expandedCards[id];
      render();
    }

    function switchTab(tab) {
      activeTab = tab;
      document.getElementById('btn-tab-kanban').className = tab === 'kanban' ? 'flex items-center gap-2 px-4 py-2 rounded-md text-sm font-medium transition-colors bg-white text-blue-600 shadow-sm' : 'flex items-center gap-2 px-4 py-2 rounded-md text-sm font-medium transition-colors text-slate-500 hover:text-slate-700';
      document.getElementById('btn-tab-reports').className = tab === 'reports' ? 'flex items-center gap-2 px-4 py-2 rounded-md text-sm font-medium transition-colors bg-white text-blue-600 shadow-sm' : 'flex items-center gap-2 px-4 py-2 rounded-md text-sm font-medium transition-colors text-slate-500 hover:text-slate-700';
      render();
    }

    function render() {
      const container = document.getElementById('main-content');
      if (activeTab === 'kanban') renderBoard(container);
      else renderReports(container);
    }

    function renderBoard(container) {
      let html = `<div class="flex gap-6 h-full items-start min-w-max">`;
      COLUMNS.forEach(col => {
        const colTasks = tasks.filter(t => !t.parentId && t.status === col.id);
        html += `
          <div ondragover="handleDragOver(event)" ondrop="handleDrop(event, '${col.id}')" class="w-80 flex flex-col rounded-xl border ${col.color} max-h-[calc(100vh-140px)]">
            <div class="p-4 border-b border-inherit bg-white/50 rounded-t-xl flex justify-between items-center">
              <h2 class="font-semibold text-slate-700">${col.title}</h2>
              <span class="bg-white text-slate-500 text-xs px-2 py-1 rounded-full shadow-sm font-bold">${colTasks.length}</span>
            </div>
            <div class="p-3 flex-1 overflow-y-auto space-y-3 custom-scrollbar">
        `;

        if (colTasks.length === 0) {
          html += `<div class="h-24 border-2 border-dashed border-slate-200 rounded-lg flex items-center justify-center text-slate-400 text-sm">Arraste cards para cá</div>`;
        } else {
          colTasks.forEach(task => {
            const subtasks = tasks.filter(t => t.parentId === task.id);
            const priority = PRIORITIES.find(p => p.id === task.priority) || PRIORITIES[1];
            
            html += `
              <div draggable="true" ondragstart="handleDragStart(event, '${task.id}')" ondragend="handleDragEnd(event)" onclick="openTask('${task.id}')" class="bg-white p-4 rounded-lg shadow-sm border border-slate-200 cursor-grab active:cursor-grabbing hover:shadow-md transition-shadow group flex flex-col">
                <div class="flex justify-between items-start mb-2">
                  <span class="text-xs font-semibold px-2 py-1 rounded-md ${priority.color}">${priority.label}</span>
                  <button onclick="confirmDelete(event, '${task.id}')" class="text-slate-400 hover:text-red-500 p-1 rounded transition-colors"><i class="fa-regular fa-trash-can"></i></button>
                </div>
                <h3 class="font-bold text-slate-800 leading-snug mb-3">${task.title}</h3>
                
                <div class="flex items-center justify-between mt-auto pt-3 border-t border-slate-100">
                  <div class="flex items-center gap-2 text-xs text-slate-400">
                    ${(task.startDate || task.endDate) ? `<span><i class="fa-regular fa-calendar"></i> ${task.endDate ? task.endDate.split('-').reverse().slice(0,2).join('/') : 'S/P'}</span>` : ''}
                    ${task.comments?.length ? `<span><i class="fa-regular fa-comment"></i> ${task.comments.length}</span>` : ''}
                  </div>
                  
                  <button onclick="toggleTimer(event, '${task.id}')" class="flex items-center gap-1.5 px-2 py-1 rounded text-xs font-semibold transition-all border ${task.isTimerRunning ? 'bg-red-50 text-red-600 border-red-200 hover:bg-red-100' : 'bg-slate-50 text-slate-600 border-slate-200 hover:bg-slate-100'}">
                    <i class="fa-solid ${task.isTimerRunning ? 'fa-pause' : 'fa-play'}"></i>
                    <span data-timer-id="${task.id}" class="font-mono">${formatTime(task.timeSpent)}</span>
                  </button>
                </div>
            `;

            if (subtasks.length > 0) {
              const isExpanded = expandedCards[task.id];
              html += `<div class="mt-3 pt-3 border-t border-slate-100"><button onclick="toggleExpandCard(event, '${task.id}')" class="flex items-center gap-1 text-xs text-slate-500 font-medium hover:text-slate-700 w-full"><i class="fa-solid ${isExpanded ? 'fa-chevron-up' : 'fa-chevron-down'}"></i>${subtasks.length} Subtarefas</button>`;
              if (isExpanded) {
                html += `<div class="mt-2 space-y-2">`;
                subtasks.forEach(sub => {
                  html += `<div onclick="event.stopPropagation(); openTask('${sub.id}')" class="flex items-center justify-between p-2 bg-slate-50 rounded-md border border-slate-200 hover:border-blue-300 transition-colors"><div class="flex items-center gap-2 overflow-hidden"><i class="fa-solid fa-arrow-turn-up rotate-90 text-slate-400 text-[10px]"></i><span class="text-xs font-medium text-slate-700 truncate">${sub.title}</span></div><span class="text-[9px] bg-white px-1.5 py-0.5 rounded shadow-sm border border-slate-100 text-slate-500 font-bold uppercase">${COLUMNS.find(c => c.id === sub.status)?.title.split(' ')[0] || '...'}</span></div>`;
                });
                html += `</div>`;
              }
              html += `</div>`;
            }
            html += `</div>`;
          });
        }
        html += `</div></div>`;
      });
      html += `</div>`;
      container.innerHTML = html;
      updateTimerElements();
    }

    function renderReports(container) {
      const totalTasks = tasks.length;
      const getLiveTime = (task) => task.timeSpent + (task.isTimerRunning && task.lastTimerStart ? Math.floor((Date.now() - task.lastTimerStart) / 1000) : 0);
      const totalTimeSpent = tasks.reduce((acc, t) => acc + getLiveTime(t), 0);

      let html = `<div class="max-w-6xl mx-auto space-y-6 pb-12"><div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><span class="text-sm font-semibold text-slate-500 uppercase tracking-wider block mb-1">Total de Demandas</span><span class="text-4xl font-bold text-blue-600">${totalTasks}</span></div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><span class="text-sm font-semibold text-slate-500 uppercase tracking-wider block mb-1">Tempo Total Gasto</span><span class="text-4xl font-bold text-indigo-600 font-mono">${formatTime(totalTimeSpent)}</span></div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><span class="text-sm font-semibold text-slate-500 uppercase tracking-wider block mb-1">Cronômetros Ativos</span><span class="text-4xl font-bold text-red-500">${tasks.filter(t => t.isTimerRunning).length}</span></div>
          </div><div class="grid grid-cols-1 lg:grid-cols-2 gap-6"><div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><h3 class="text-lg font-bold text-slate-800 mb-6"><i class="fa-solid fa-list-check mr-2"></i>Distribuição por Estágio</h3><div class="space-y-4">`;

      COLUMNS.forEach(col => {
        const count = tasks.filter(t => t.status === col.id).length;
        const pct = totalTasks > 0 ? Math.round((count / totalTasks) * 100) : 0;
        html += `<div><div class="flex justify-between items-center mb-1 text-sm font-medium text-slate-700"><span>${col.title}</span><span>${count} (${pct}%)</span></div><div class="w-full bg-slate-100 rounded-full h-2"><div class="bg-blue-600 h-full rounded-full transition-all" style="width: ${pct}%"></div></div></div>`;
      });

      html += `</div></div><div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><h3 class="text-lg font-bold text-slate-800 mb-6"><i class="fa-solid fa-tags mr-2"></i>Métricas por Tipo</h3><div class="space-y-4">`;

      TASK_TYPES.forEach(type => {
        const typeTasks = tasks.filter(t => t.type === type.id);
        const count = typeTasks.length;
        const pct = totalTasks > 0 ? Math.round((count / totalTasks) * 100) : 0;
        html += `<div><div class="flex justify-between items-center mb-1 text-sm font-medium text-slate-700"><span>${type.label}</span><span>${count} (${pct}%)</span></div><div class="w-full bg-slate-100 rounded-full h-2"><div class="bg-indigo-500 h-full rounded-full transition-all" style="width: ${pct}%"></div></div></div>`;
      });

      html += `</div></div></div></div>`;
      container.innerHTML = html;
    }

    function renderModal() {
      const container = document.getElementById('modal-container');
      if (modalStack.length === 0) { container.classList.add('hidden'); container.innerHTML = ''; return; }
      const activeId = modalStack[modalStack.length - 1];
      const task = tasks.find(t => t.id === activeId);
      if (!task) return;
      const subtasks = tasks.filter(t => t.parentId === task.id);

      container.innerHTML = `
        <div class="fixed inset-0 z-50 bg-slate-900/50 backdrop-blur-sm flex justify-center items-start overflow-y-auto p-4 sm:p-6" onclick="closeAllModals()">
          <div class="bg-white w-full max-w-3xl rounded-2xl shadow-2xl mt-10 mb-10 flex flex-col overflow-hidden animate-in fade-in duration-200" onclick="event.stopPropagation()">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
              <div class="flex items-center gap-4">
                ${modalStack.length > 1 ? `<button onclick="closeTask()" class="p-2 hover:bg-slate-200 rounded-lg text-slate-500"><i class="fa-solid fa-arrow-left"></i></button>` : ''}
                <span class="text-sm font-bold text-slate-500 uppercase tracking-wider">${task.parentId ? 'Subtarefa' : 'Demanda'}</span>
              </div>
              <button onclick="closeAllModals()" class="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-200/50 rounded-lg"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-6 md:p-8 flex-1 overflow-y-auto space-y-6">
              <div><input type="text" onblur="updateTaskField('${task.id}', 'title', this.value)" class="w-full text-2xl font-bold text-slate-800 border-none outline-none focus:ring-0" value="${task.title}" placeholder="Título..."></div>
              <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 bg-slate-50 p-5 rounded-xl border border-slate-100">
                <div><label class="block text-xs font-semibold text-slate-500 uppercase mb-2">Estágio</label><select onchange="updateTaskField('${task.id}', 'status', this.value)" class="w-full bg-white border rounded-lg px-3 py-2 text-sm">${COLUMNS.map(c => `<option value="${c.id}" ${task.status === c.id ? 'selected' : ''}>${c.title}</option>`).join('')}</select></div>
                <div><label class="block text-xs font-semibold text-slate-500 uppercase mb-2">Prioridade</label><select onchange="updateTaskField('${task.id}', 'priority', this.value)" class="w-full bg-white border rounded-lg px-3 py-2 text-sm">${PRIORITIES.map(p => `<option value="${p.id}" ${task.priority === p.id ? 'selected' : ''}>${p.label}</option>`).join('')}</select></div>
                <div><label class="block text-xs font-semibold text-slate-500 uppercase mb-2">Tipo</label><select onchange="updateTaskField('${task.id}', 'type', this.value)" class="w-full bg-white border rounded-lg px-3 py-2 text-sm">${TASK_TYPES.map(t => `<option value="${t.id}" ${task.type === t.id ? 'selected' : ''}>${t.label}</option>`).join('')}</select></div>
                <div><label class="block text-xs font-semibold text-slate-500 uppercase mb-2">Início</label><input type="date" onchange="updateTaskField('${task.id}', 'startDate', this.value)" class="w-full bg-white border rounded-lg px-3 py-2 text-sm" value="${task.startDate || ''}"></div>
                <div><label class="block text-xs font-semibold text-slate-500 uppercase mb-2">Conclusão</label><input type="date" onchange="updateTaskField('${task.id}', 'endDate', this.value)" class="w-full bg-white border rounded-lg px-3 py-2 text-sm" value="${task.endDate || ''}"></div>
              </div>
              
              <div class="border border-slate-200 rounded-xl overflow-hidden">
                <div class="px-5 py-4 border-b border-slate-100 flex items-center justify-between bg-slate-50"><label class="text-sm font-semibold text-slate-800">Subtarefas (${subtasks.length})</label><button onclick="handleCreateTask('${task.id}')" class="text-sm text-blue-600 bg-white border px-3 py-1.5 rounded-lg"><i class="fa-solid fa-plus"></i></button></div>
                <div class="p-2 space-y-1">${subtasks.map(sub => `<div onclick="openTask('${sub.id}')" class="flex justify-between p-3 rounded-lg hover:bg-slate-50 cursor-pointer border hover:border-slate-200"><span class="text-sm text-slate-700">${sub.title}</span><span class="text-xs bg-slate-100 px-2 py-1 rounded">${COLUMNS.find(c => c.id === sub.status)?.title || '...'}</span></div>`).join('')}</div>
              </div>

              <div class="space-y-3"><label class="block text-sm font-semibold text-slate-800">Descrição</label><textarea onblur="updateTaskField('${task.id}', 'description', this.value)" class="w-full min-h-[120px] bg-slate-50 border rounded-xl px-4 py-3 text-sm">${task.description || ''}</textarea></div>
              
              <div class="space-y-3 pt-6 border-t border-slate-100">
                <label class="block text-sm font-semibold text-slate-800">Comentários</label>
                <div class="space-y-4">${task.comments?.map(c => `<div class="flex gap-4"><div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 text-sm">U</div><div class="flex-1 bg-slate-50 border p-3 rounded-tr-xl rounded-b-xl"><div class="flex justify-between mb-1"><span class="text-xs font-semibold">Você</span><button onclick="deleteComment('${task.id}', '${c.id}')" class="text-slate-400 hover:text-red-500"><i class="fa-solid fa-trash"></i></button></div><p class="text-sm text-slate-600">${c.text}</p></div></div>`).join('') || ''}</div>
                <div class="flex gap-3 pt-4"><div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-sm">U</div><div class="flex-1 flex flex-col items-end gap-2"><textarea id="comment-text-input" class="w-full bg-white border rounded-xl px-4 py-3 text-sm h-20"></textarea><button onclick="addComment('${task.id}')" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm">Comentar</button></div></div>
              </div>
            </div>
          </div>
        </div>`;
      container.classList.remove('hidden');
    }

    function updateTaskField(id, field, value) { tasks = tasks.map(t => t.id === id ? { ...t, [field]: value } : t); saveState(); }
    function addComment(taskId) { const text = document.getElementById('comment-text-input').value.trim(); if (!text) return; tasks = tasks.map(t => t.id === taskId ? { ...t, comments: [...(t.comments || []), { id: `c${Date.now()}`, text, date: new Date().toISOString() }] } : t); saveState(); renderModal(); }
    function deleteComment(taskId, commentId) { tasks = tasks.map(t => t.id === taskId ? { ...t, comments: t.comments.filter(c => c.id !== commentId) } : t); saveState(); renderModal(); }

    // Iniciar a Aplicação e puxar do Drive
    window.onload = loadData;
  </script>
</body>
</html>
